kind = "web"
previewPath = "/"
title = "Zeus Insurance"
version = "1.0.0"

[[services]]
localPort = 5173
name = "web"
paths = ["/"]

[services.env]
PORT = "5173"
BASE_PATH = "/"

[services.development]
run = "PORT=5173 BASE_PATH=/ pnpm --filter @workspace/frontend run dev"

[services.production]
build = "PORT=5173 BASE_PATH=/ pnpm --filter @workspace/frontend run build"
serve = "static"
